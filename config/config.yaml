# Fuel model parameters
fuel_model:
  starting_fuel_kg: 110
  burn_rate_kg_per_lap: 1.8
  car_dry_weight_kg: 798

# Tire degradation parameters
tire_model:
  compounds:
    SOFT:
      compound_factor: 1.0
      degradation_rate: 0.045
    MEDIUM:
      compound_factor: 0.97
      degradation_rate: 0.028
    HARD:
      compound_factor: 0.94
      degradation_rate: 0.015
    INTERMEDIATE:
      compound_factor: 0.85
      degradation_rate: 0.020
    WET:
      compound_factor: 0.75
      degradation_rate: 0.012

# 2026 Simulation Parameters
simulation_2026:
  weight_reduction_kg: 20
  combustion_power_penalty_factor: 0.10
  electric_torque_gain_factor: 0.03
  fallback_damping_factor: 0.5

# Modeling configuration
modeling:
  target_variable: "lap_time_delta_from_session_median"
  test_size: 0.2
  cv_folds: 5
  random_state: 42
  rmse_target_seconds: 0.5