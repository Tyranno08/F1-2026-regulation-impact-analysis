# Project Configuration

project:
  name: "F1 Regulation Impact Analysis"
  version: "1.0.0"

# Training seasons — used to build and train the ML model
training_seasons:
  - 2023
  - 2024
  - 2025

# Validation seasons — real 2026 results to validate simulation
validation_seasons:
  - 2026

# The two 2026 circuits with real race data available
# Race 1: Australian Grand Prix — Melbourne
# Race 2: Chinese Grand Prix — Shanghai
validation_circuits_2026:
  - name: "Australia"
    race_number: 1
    full_name: "Australian Grand Prix"
    location: "Melbourne"
  - name: "China"
    race_number: 2
    full_name: "Chinese Grand Prix"
    location: "Shanghai"

